<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天使笑長 | 幸福教養系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9E3; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }
        
        .zhuyin-container { display: inline-flex; flex-direction: row; flex-wrap: wrap; align-items: flex-start; justify-content: center; gap: 1.5rem; padding: 0.4rem; max-width: 100%; }
        .syllable-v-stack { display: inline-flex; flex-direction: column; align-items: center; position: relative; line-height: 1.1; min-width: 1.4rem; }
        .symbol-item { font-size: 1.25rem; height: 1.35rem; font-weight: 800; color: #334155; display: flex; align-items: center; justify-content: center; position: relative; }
        .tone-side-right { position: absolute; right: -0.8rem; top: 0; font-size: 0.85rem; font-weight: 900; color: #64748b; }
        .is-long-text .symbol-item { font-size: 1rem; height: 1.1rem; }
        .is-long-text .tone-side-right { font-size: 0.65rem; right: -0.65rem; }

        input[type="checkbox"]:checked { background-color: #F472B6; border-color: #F472B6; }
        .no-break { white-space: nowrap; word-break: keep-all; }
        
        .primary-pink-btn { background-color: #F472B6; transition: all 0.2s; box-shadow: 0 10px 25px -5px rgba(244, 114, 182, 0.35); }
        .primary-pink-btn:active { transform: scale(0.96); opacity: 0.9; }
        .primary-pink-btn:disabled { background-color: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: not-allowed; opacity: 0.7; }
        
        .quiz-card-btn { min-height: 8.5rem; height: auto; padding: 1.2rem 0.4rem; border-width: 2px; }
    </style>
</head>
<body class="pb-12 text-slate-800 text-sm">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-white px-5 pt-8 pb-5 rounded-b-[35px] shadow-sm border-b border-pink-100 sticky top-0 z-50 flex items-center justify-start gap-3">
            <div class="w-9 h-9 bg-pink-400 rounded-xl flex items-center justify-center text-white shadow-lg transition-transform active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </div>
            <div class="text-left">
                <h1 class="text-xs font-black text-gray-800 tracking-tight no-break">天使笑長</h1>
                <p class="text-[8px] text-pink-500 font-black tracking-[0.2em] uppercase no-break">幸福智多星 · 幸福教養系統</p>
            </div>
        </header>

        <main id="main-content" class="px-5 py-6 flex-1"></main>

        <footer class="text-center opacity-30 py-6">
            <p class="text-[8px] font-black tracking-[0.3em] uppercase text-slate-400">Happiness Mastermind · V5.90 Professional Plan</p>
        </footer>
    </div>

    <script>
        let state = { 
            step: 0, 
            formData: { name: '', hasFilledForm: false }, 
            quizIndex: 0, 
            quizResults: [], 
            report: null, 
            currentQuestionStartTime: 0 
        };

        const QUIZ_BANK = [
            { id: 1, type: '視覺排他', p: 'b', a: 'ㄅ', opts: ['ㄅ','ㄉ','ㄆ','ㄌ'] },
            { id: 2, type: '聲母辨識', p: 'p', a: 'ㄆ', opts: ['ㄑ','ㄆ','ㄡ','ㄅ'] },
            { id: 3, type: '聲母辨識', p: 'm', a: 'ㄇ', opts: ['ㄇ','ㄋ','ㄈ','ㄩ'] },
            { id: 4, type: '聲調辨識', p: 'bà', a: 'ㄅㄚˋ', opts: ['ㄅㄚˋ','ㄆㄚˋ','ㄅㄚˇ','ㄆㄚ'] },
            { id: 5, type: '聲調辨識', p: 'lóu', a: 'ㄌㄡˊ', opts: ['ㄌㄡˊ','ㄋㄡˊ','ㄌㄡˇ','ㄖㄡˊ'] },
            { id: 6, type: '結合韻轉換', p: 'lian', a: 'ㄌㄧㄢ', opts: ['ㄌㄧㄢ','ㄌㄢ','ㄌㄧㄥ','ㄋㄧㄢ'] },
            { id: 7, type: '結合韻轉換', p: 'huang', a: 'ㄏㄨㄤ', opts: ['ㄏㄨㄤ','ㄏㄤ','ㄏㄨㄥ','ㄏㄨㄢ'] },
            { id: 8, type: '特殊空韻', p: 'chi', a: 'ㄔ', opts: ['ㄔ','ㄔㄧ','ㄕ','ㄗ'] }, 
            { id: 9, type: '特殊空韻', p: 'si', a: 'ㄙ', opts: ['ㄙ','ㄙㄧ','ㄕ','ㄒㄧ'] },
            { id: 10, type: '綜合自動化', p: 'xué xiào', a: 'ㄒㄩㄝˊ ㄒㄧㄠˋ', opts: ['ㄒㄩㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˇ ㄒㄧㄠ','ㄒㄧㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˊ ㄒㄧㄠ'] },
            { id: 11, type: '綜合自動化', p: 'péng yǒu', a: 'ㄆㄥˊ ㄧㄡˇ', opts: ['ㄆㄥˊ ㄧㄡˇ','ㄅㄥˊ ㄧㄡˇ','ㄆㄥˊ ㄧㄡ','ㄆㄥˇ ㄧㄡ'] }
        ];

        function formatZhuyinVertical(str) {
            const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
            const syllables = str.split(' ');
            const isLong = str.length > 5;
            let html = `<span class="zhuyin-container ${isLong ? 'is-long-text' : ''}">`;
            syllables.forEach(syl => {
                let tone = "";
                let baseSyl = syl;
                for(let t of tones) if(syl.includes(t)) { tone = t; baseSyl = syl.replace(t, ""); break; }
                const chars = baseSyl.split('');
                html += `<span class="syllable-v-stack">`;
                chars.forEach((char, idx) => {
                    if (idx === chars.length - 1 && tone) html += `<span class="symbol-item">${char}<span class="tone-side-right">${tone}</span></span>`;
                    else html += `<span class="symbol-item">${char}</span>`;
                });
                if (chars.length === 0 && tone) html += `<span class="symbol-item">&nbsp;<span class="tone-side-right">${tone}</span></span>`;
                html += `</span>`;
            });
            html += `</span>`;
            return html;
        }

        function render() {
            const el = document.getElementById('main-content');
            if (state.step === 0) {
                el.innerHTML = `
                    <div class="bg-white p-7 rounded-[35px] shadow-sm border border-pink-50 animate-fade-in text-left">
                        <h2 class="text-sm font-black text-slate-700 mb-5 no-break flex items-center gap-2">第一步：預約表單</h2>
                        <div class="space-y-6">
                            <button onclick="window.open('https://forms.gle/Ph8FfFPRtgMcVr5W8', '_blank')" class="w-full bg-blue-50 text-blue-600 py-3.5 rounded-[22px] font-black border border-blue-100 text-[10px]">前往 Google 預約表單</button>
                            <div class="flex items-center gap-3 p-1">
                                <input type="checkbox" id="form-check" class="w-4 h-4 rounded text-pink-500" ${state.formData.hasFilledForm ? 'checked' : ''}>
                                <label for="form-check" class="text-[9px] text-slate-400 font-bold">我已完成填寫並返回網頁</label>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 mb-2 block uppercase tracking-widest">寶貝姓名</label>
                                <input id="name-input" type="text" class="w-full p-4 bg-slate-50 rounded-[22px] border-none outline-none text-base font-bold text-slate-700 shadow-inner" placeholder="例如：小明" value="${state.formData.name}">
                            </div>
                            <button id="start-btn" class="primary-pink-btn w-full text-white py-4 rounded-[25px] font-black text-base transition-all disabled:opacity-50">幫寶貝前測</button>
                        </div>
                    </div>
                `;
                const n = document.getElementById('name-input'), c = document.getElementById('form-check'), b = document.getElementById('start-btn');
                const update = () => b.disabled = !(n.value.trim().length > 0 && c.checked);
                n.oninput = (e) => { state.formData.name = e.target.value; update(); };
                c.onchange = (e) => { state.formData.hasFilledForm = e.target.checked; update(); };
                b.onclick = () => { if(!b.disabled) { state.step = 1; state.currentQuestionStartTime = performance.now(); render(); } };
                update();
            } else if (state.step === 1) {
                const q = QUIZ_BANK[state.quizIndex];
                const opts = [...q.opts].sort(() => Math.random() - 0.5);
                el.innerHTML = `
                    <div class="bg-white p-7 rounded-[35px] shadow-sm animate-fade-in relative border border-pink-50 text-center">
                        <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-50"><div class="h-full bg-pink-400 transition-all duration-500" style="width: ${((state.quizIndex + 1) / QUIZ_BANK.length) * 100}%"></div></div>
                        <div class="flex justify-between items-center mb-8 mt-3">
                            <span class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-[9px] font-black tracking-widest">${q.type}</span>
                            <span class="text-[9px] font-black text-slate-300">${state.quizIndex + 1} / ${QUIZ_BANK.length}</span>
                        </div>
                        <div class="text-4xl font-black text-slate-800 tracking-[0.2em] bg-slate-50 py-10 rounded-[35px] mb-8 shadow-inner font-serif">${q.p}</div>
                        <div class="grid grid-cols-2 gap-4">
                            ${opts.map(opt => `<button onclick="handleAnswer('${opt}')" class="quiz-card-btn bg-white border-2 border-slate-100 rounded-[28px] font-black text-slate-700 flex items-center justify-center shadow-sm active:scale-95 transition-all">${formatZhuyinVertical(opt)}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else if (state.step === 2) {
                el.innerHTML = `<div class="text-center py-20 flex flex-col items-center"><div class="w-20 h-20 bg-pink-100 rounded-[35px] flex items-center justify-center mb-10 animate-bounce text-pink-400 shadow-inner"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><h3 class="text-xl font-black text-slate-800 tracking-tight">學理精密分析中</h3></div>`;
            } else if (state.step === 3) {
                const avgTime = (state.quizResults.reduce((a, b) => a + b.duration, 0) / state.quizResults.length / 1000).toFixed(2);
                const correctCount = state.quizResults.filter(r => r.ok).length;
                const accuracy = ((correctCount / QUIZ_BANK.length) * 100).toFixed(0);

                el.innerHTML = `
                    <div class="space-y-5 animate-zoom-in text-left">
                        <div class="bg-white p-7 rounded-[40px] border-l-[12px] border-pink-400 shadow-sm relative">
                            <h2 class="text-lg font-black text-slate-800 mb-5 tracking-tight">${state.formData.name} 寶貝家長：</h2>
                            
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">大腦解碼反應速</p>
                                    <p class="text-xl font-black text-pink-500">${avgTime}<span class="text-[10px] ml-1">秒</span></p>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">神經辨識準度</p>
                                    <p class="text-xl font-black text-blue-500">${accuracy}<span class="text-[10px] ml-1">%</span></p>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <section class="bg-slate-50 p-6 rounded-[28px] text-[13px] text-slate-600 font-medium leading-relaxed">
                                    <p class="mb-3 font-black text-slate-800 text-sm">【五大維度學理診斷】</p>
                                    ${state.report.diagnosis}
                                    
                                    <div class="mt-5 pt-4 border-t border-slate-200">
                                        <p class="font-black text-pink-500 mb-2 text-xs">🎯 階段性教學目標設定：</p>
                                        <div class="space-y-3 mb-5">
                                            <div class="bg-pink-50 p-3 rounded-xl border border-pink-100">
                                                <p class="text-[10px] font-black text-pink-600 mb-1">第一階段：神經連結穩定</p>
                                                <p class="text-[11px] leading-tight text-slate-600">${state.report.goalStage1}</p>
                                            </div>
                                            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                                <p class="text-[10px] font-black text-blue-600 mb-1">第二階段：腦迴路自動化</p>
                                                <p class="text-[11px] leading-tight text-slate-600">${state.report.goalStage2}</p>
                                            </div>
                                        </div>

                                        <p class="font-black text-slate-700 mb-2 text-xs">🧠 加強課專屬規劃：</p>
                                        <div class="bg-slate-800 p-4 rounded-2xl text-slate-200 border border-slate-700 shadow-inner">
                                            <p class="text-[11px] leading-relaxed italic">${state.report.coursePlan}</p>
                                        </div>

                                        <div class="mt-5 p-3 bg-white rounded-xl border border-slate-100 italic">
                                            <p class="text-[9px] font-bold text-slate-400 leading-tight">分析結果供製定學習方案。堂數視寶貝學習狀況，彈性伸縮。</p>
                                        </div>
                                    </div>
                                </section>
                                <div class="border-t border-dashed border-pink-200 pt-5">
                                    <p class="text-xs font-black text-pink-500 mb-2">笑長悄悄話：</p>
                                    <p class="text-sm font-bold text-pink-500 leading-relaxed italic">${state.report.angelNote}</p>
                                </div>
                            </div>
                            <button onclick="state.step=4; render();" class="primary-pink-btn w-full mt-8 text-white py-5 rounded-[28px] font-black text-lg">方案報價</button>
                        </div>
                    </div>`;
            } else if (state.step === 4) {
                el.innerHTML = `
                    <div class="space-y-5 animate-fade-in text-left">
                        <div class="bg-white p-7 rounded-[35px] shadow-sm border border-pink-50">
                            <h2 class="text-lg font-black text-slate-800 mb-6 no-break text-center">幸福教養方案報價</h2>
                            <div class="space-y-5">
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="p-4 bg-slate-50 rounded-[25px] border border-slate-100 flex flex-col justify-center">
                                        <div class="text-xl font-black text-slate-700">$750 <span class="text-[9px]">/ 90min</span></div>
                                        <div class="text-[8px] text-slate-400 mt-1 font-bold">教材費另計</div>
                                    </div>
                                    <div class="p-4 bg-pink-50 rounded-[25px] border border-pink-100 flex flex-col justify-center">
                                        <div class="text-xl font-black text-pink-600">$1000 <span class="text-[9px]">/ 90min</span></div>
                                        <div class="text-[8px] text-pink-400 mt-1 font-bold">含客製化教材</div>
                                    </div>
                                </div>
                                
                                <div class="p-6 bg-gradient-to-br from-pink-400 to-pink-500 text-white rounded-[30px] shadow-lg relative overflow-hidden border border-pink-300">
                                    <div class="relative z-10">
                                        <div class="text-[9px] font-black uppercase tracking-widest opacity-80 mb-1">🏅 客製化教養方案</div>
                                        <div class="text-2xl font-black mb-1.5">專屬成長路徑</div>
                                        <div class="text-[10px] leading-relaxed opacity-90">
                                            基於前測學理分析製定。我們重視「認知負荷」的動態調整，堂數將視寶貝學習狀況彈性伸縮，確保大腦自動化路徑穩定建立。
                                        </div>
                                    </div>
                                    <div class="absolute -bottom-3 -right-3 opacity-10">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                    </div>
                                </div>
                            </div>
                            <button onclick="window.open('https://line.me/R/msg/text/?'+encodeURIComponent('【前測精密學理診斷】\\n寶貝：'+state.formData.name+'\\n瓶頸：'+state.report.bottleneck+'\\n加強課規劃：'+state.report.coursePlan.substring(0,50)+'...\\n家長對彈性堂數方案有興趣'), '_blank')" class="w-full mt-7 bg-[#06C755] text-white py-4.5 rounded-[25px] font-black text-base no-break text-center">按一下回傳前測分析</button>
                        </div>
                    </div>`;
            }
        }

        async function handleAnswer(ans) {
            const endTime = performance.now();
            const duration = endTime - state.currentQuestionStartTime;
            const q = QUIZ_BANK[state.quizIndex];
            state.quizResults.push({ type: q.type, ok: ans === q.a, duration: duration });
            if (state.quizIndex < QUIZ_BANK.length - 1) { 
                state.quizIndex++; 
                state.currentQuestionStartTime = performance.now();
                render(); 
            } else { state.step = 2; render(); await generateReport(); }
        }

        async function generateReport() {
            const apiKey = ""; 
            const sys = `你是一位具備教育心理學與腦科學深厚背景的「天使笑長」。
            請根據數據產出具備專業學理性、針對性的診斷 JSON。
            
            【規範與學理要求】：
            1. 稱呼僅限「${state.formData.name} 寶貝家長您好：」。
            2. 診斷運用術語：認知負荷(Cognitive Load)、音韻覺識(Phonological Awareness)、解碼自動化、視覺空間解碼。
            3. 分析數據時，需說明反應時間(duration)長短反映的解碼成本。
            
            【加強課規劃要求】：
            1. 根據測驗結果中最薄弱的部分（錯誤多或反應慢的維度），擬定加強方案。
            2. 方案需具備具體的學理訓練方式，如「音韻合成辨識法」或「視覺排他性訓練」。
            3. 註明此規劃供方案製定參考。
            
            JSON 結構：
            {
              "diagnosis": "學理診斷內容(150字內)",
              "goalStage1": "第一階段目標(40字內)",
              "goalStage2": "第二階段目標(40字內)",
              "coursePlan": "針對薄弱環節擬定的加強課規劃，需包含具體訓練方式。(80字內)",
              "bottleneck": "一句話總結核心學理瓶頸",
              "angelNote": "專業溫暖的悄悄話，從家長心靈支持出發(50字內)"
            }`;

            const prompt = { studentName: state.formData.name, results: state.quizResults };
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: JSON.stringify(prompt) }] }],
                systemInstruction: { parts: [{ text: sys }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    if (!resp.ok) throw new Error("API Connection Failed");
                    const data = await resp.json();
                    state.report = JSON.parse(data.candidates[0].content.parts[0].text);
                    state.step = 3; render(); return;
                } catch (e) { await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000)); }
            }
            state.report = { 
                diagnosis: `${state.formData.name} 寶貝家長您好：從數據看來，寶貝在拼讀自動化路徑上仍有優化空間，建議透過系統化練習降低大腦解碼的認知負荷。`, 
                goalStage1: "穩定音韻覺識與視覺空間的連結效率。",
                goalStage2: "強化神經迴路的自動化提取速度。",
                coursePlan: "強化「音韻合成」練習，透過每日 15 分鐘的聽覺剝離訓練，建立穩定的解碼神經路徑。",
                bottleneck: "大腦解碼自動化程度待優化", 
                angelNote: "您的溫暖陪伴，能啟動孩子的前額葉發展，讓學習更高效。" 
            };
            state.step = 3; render();
        }

        render();
    </script>
</body>
</html>
