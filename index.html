<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天使笑長 | 大腦密碼轉換系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9E3; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }
        
        /* --- 幸福智多星：專屬全垂直注音排版系統 (排版修復版) --- */
        .zhuyin-block-wrapper {
            display: inline-flex;
            flex-wrap: wrap; /* 內容過長自動換行，防止跑版 */
            align-items: flex-start;
            justify-content: center;
            gap: 1.2rem; /* 音節間距微調 */
            padding: 0.5rem;
            max-width: 100%;
        }
        .syllable-vertical-stack {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            line-height: 1.1;
            min-width: 1.5rem;
        }
        .initial-part {
            font-size: 1.2rem;
            min-height: 1.3rem;
            font-weight: 800;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .finals-bottom-layer {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 1.2rem;
            font-weight: 800;
            color: #334155;
        }
        .final-char-unit {
            position: relative;
        }
        /* 聲調定位：更精準的右側鎖定 */
        .tone-marker-right {
            position: absolute;
            right: -0.75rem;
            top: -0.1rem;
            font-size: 0.8rem;
            font-weight: 900;
            color: #64748b;
        }
        
        /* 縮放規則：針對較長題目進行縮小處理 */
        .is-long-phrase .initial-part, .is-long-phrase .finals-bottom-layer { font-size: 1rem; }
        .is-long-phrase .tone-marker-right { font-size: 0.65rem; right: -0.65rem; }
        .is-long-phrase { gap: 0.8rem; }

        input[type="checkbox"]:checked { background-color: #F472B6; border-color: #F472B6; }
        .no-break { white-space: nowrap; word-break: keep-all; }
        
        /* 診斷報告文字自動換行修正 */
        .report-text { word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }

        /* 按鈕高度自適應 */
        .quiz-option-btn {
            min-height: 8.5rem;
            height: auto;
            padding: 1.25rem 0.5rem;
        }
        
        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #FBCFE8; border-radius: 10px; }
    </style>
</head>
<body class="pb-12 text-slate-800">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- Header: 幸福教養概念館品牌設計 -->
        <header class="bg-white px-6 pt-10 pb-6 rounded-b-[45px] shadow-sm border-b border-pink-100 sticky top-0 z-50 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-pink-400 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-pink-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                </div>
                <div class="text-left">
                    <h1 class="text-lg font-bold text-gray-800 tracking-tight">天使笑長</h1>
                    <p class="text-[10px] text-pink-500 font-bold tracking-[0.2em] uppercase">幸福智多星系統</p>
                </div>
            </div>
            <div class="bg-amber-50 px-3 py-1.5 rounded-full flex items-center gap-2 border border-amber-100">
                <div class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black text-amber-600">自動診斷中</span>
            </div>
        </header>

        <!-- 主內容顯示區 -->
        <main id="main-content" class="px-5 py-8 flex-1">
            <!-- 初始加載中... -->
        </main>

        <footer class="text-center opacity-30 px-6 mt-auto py-6">
            <p class="text-[9px] font-black tracking-[0.3em] uppercase text-slate-400">
                Happiness Mastermind · Layout Fixed V4.1
            </p>
        </footer>
    </div>

    <script>
        // --- 核心測驗資料 ---
        const QUIZ_BANK = [
            { id: 1, type: '視覺排他', p: 'b', a: 'ㄅ', opts: ['ㄅ','ㄉ','ㄆ','ㄌ'] },
            { id: 2, type: '視覺排他', p: 'p', a: 'ㄆ', opts: ['ㄑ','ㄆ','ㄡ','ㄅ'] },
            { id: 3, type: '視覺排他', p: 'm', a: 'ㄇ', opts: ['ㄇ','ㄋ','ㄈ','ㄩ'] },
            { id: 4, type: '聲調轉譯', p: 'bà', a: 'ㄅㄚˋ', opts: ['ㄅㄚˋ','ㄆㄚˋ','ㄅㄚˇ','ㄆㄚ'] },
            { id: 5, type: '聲調轉譯', p: 'lóu', a: 'ㄌㄡˊ', opts: ['ㄌㄡˊ','ㄋㄡˊ','ㄌㄡˇ','ㄖㄡˊ'] },
            { id: 6, type: '結合韻堆疊', p: 'lian', a: 'ㄌㄧㄢ', opts: ['ㄌㄧㄢ','ㄌㄢ','ㄌㄧㄥ','ㄋㄧㄢ'] },
            { id: 7, type: '結合韻堆疊', p: 'huang', a: 'ㄏㄨㄤ', opts: ['ㄏㄨㄤ','ㄏㄤ','ㄏㄨㄥ','ㄏㄨㄢ'] },
            { id: 8, type: '特殊空韻', p: 'chi', a: 'ㄔ', opts: ['ㄔ','ㄔㄧ','順','ㄗ'] },
            { id: 9, type: '特殊空韻', p: 'si', a: 'ㄙ', opts: ['ㄙ','ㄙㄧ','ㄕ','ㄒㄧ'] },
            { id: 10, type: '綜合速度', p: 'xué xiào', a: 'ㄒㄩㄝˊ ㄒㄧㄠˋ', opts: ['ㄒㄩㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˇ ㄒㄧㄠ','ㄒㄧㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˊ ㄒㄧㄠ'] },
            { id: 11, type: '綜合速度', p: 'péng yǒu', a: 'ㄆㄥˊ ㄧㄡˇ', opts: ['ㄆㄥˊ ㄧㄡˇ','ㄅㄥˊ ㄧㄡˇ','ㄆㄥˊ ㄧㄡ','ㄆㄥˇ ㄧㄡ'] }
        ];

        let state = {
            step: 0,
            formData: { name: '', hasFilledForm: false },
            quizIndex: 0,
            quizResults: [],
            report: null,
            startTime: 0
        };

        const mainContent = document.getElementById('main-content');

        // --- 排版修復：自動處理垂直注音與聲調 ---
        function formatZhuyinVertical(str) {
            const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
            const initials = ['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ'];
            const syllables = str.split(' ');
            const isLong = str.length > 5;
            
            let html = `<span class="zhuyin-block-wrapper ${isLong ? 'is-long-phrase' : ''}">`;
            
            syllables.forEach(syl => {
                let tone = "";
                let baseSyl = syl;
                for(let t of tones) if(syl.includes(t)) { tone = t; baseSyl = syl.replace(t, ""); break; }
                
                let initialChar = "";
                let finalChars = baseSyl;
                if (initials.includes(baseSyl[0])) {
                    initialChar = baseSyl[0];
                    finalChars = baseSyl.substring(1);
                }
                
                html += `
                <span class="syllable-vertical-stack">
                    <span class="initial-part">${initialChar}</span>
                    <span class="finals-bottom-layer">
                        ${finalChars.split('').map((c, i) => `
                            <span class="final-char-unit">
                                ${c}
                                ${ (i === finalChars.length - 1 && tone) ? `<span class="tone-marker-right">${tone}</span>` : '' }
                            </span>
                        `).join('')}
                        ${(!finalChars && tone) ? `<span class="tone-marker-right" style="position:static; margin-left:0.15rem;">${tone}</span>` : ''}
                    </span>
                </span>`;
            });
            
            html += `</span>`;
            return html;
        }

        function render() {
            switch(state.step) {
                case 0: renderStep0(); break;
                case 1: renderStep1(); break;
                case 2: renderStep2(); break;
                case 3: renderStep3(); break;
                case 4: renderStep4(); break;
            }
        }

        function renderStep0() {
            mainContent.innerHTML = `
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-pink-50 animate-fade-in text-left">
                    <h2 class="text-sm font-black text-slate-700 mb-6 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 第一步：填寫預約</h2>
                    <div class="space-y-6">
                        <p class="text-xs text-slate-500 leading-relaxed font-medium">請先完成預約表單，這能幫助笑長在後端初步掌握寶貝的發展現況。</p>
                        <button onclick="window.open('https://forms.gle/Ph8FfFPRtgMcVr5W8', '_blank')" class="w-full bg-blue-50 text-blue-600 py-4.5 rounded-[24px] font-black border border-blue-100 shadow-sm text-xs">前往 Google 預約表單</button>
                        <div class="flex items-center gap-3.5 p-1">
                            <input type="checkbox" id="form-check" class="w-5 h-5 rounded-lg text-pink-500" ${state.formData.hasFilledForm ? 'checked' : ''}>
                            <label for="form-check" class="text-[11px] text-slate-500 font-bold">我已完成填寫並返回網頁</label>
                        </div>
                        <div class="pt-2">
                            <label class="text-[10px] font-black text-slate-400 mb-2 block uppercase tracking-widest">寶貝姓名</label>
                            <input id="name-input" type="text" class="w-full p-4.5 bg-slate-50 rounded-[24px] border-none outline-none text-sm font-bold" placeholder="請輸入姓名" value="${state.formData.name}">
                        </div>
                        <button id="start-btn" onclick="state.step=1; render();" class="w-full bg-pink-500 text-white py-4.5 rounded-[24px] font-bold shadow-xl shadow-pink-100 disabled:opacity-30 transition-all text-sm">開始診斷前測</button>
                    </div>
                </div>
            `;
            const name = document.getElementById('name-input');
            const check = document.getElementById('form-check');
            const btn = document.getElementById('start-btn');
            const update = () => btn.disabled = !state.formData.name.trim() || !state.formData.hasFilledForm;
            check.onchange = (e) => { state.formData.hasFilledForm = e.target.checked; update(); };
            name.oninput = (e) => { state.formData.name = e.target.value; update(); };
            update();
        }

        function renderStep1() {
            const q = QUIZ_BANK[state.quizIndex];
            const opts = [...q.opts].sort(() => Math.random() - 0.5);
            state.startTime = performance.now();
            mainContent.innerHTML = `
                <div class="bg-white p-7 rounded-[40px] shadow-sm animate-fade-in relative overflow-hidden border border-pink-50">
                    <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-50">
                        <div class="h-full bg-pink-400 transition-all duration-500" style="width: ${((state.quizIndex + 1) / 11) * 100}%"></div>
                    </div>
                    <div class="flex justify-between items-center mb-10 mt-6">
                        <span class="bg-pink-100 text-pink-600 px-3.5 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">指標前測</span>
                        <span class="text-[10px] font-black text-slate-300">進度 ${state.quizIndex + 1} / 11</span>
                    </div>
                    <div class="text-center mb-12 px-2">
                        <p class="text-[10px] text-slate-400 font-bold mb-4 uppercase tracking-widest italic">拼音轉譯解讀中...</p>
                        <div class="text-4xl font-black text-slate-800 tracking-widest bg-slate-50 py-10 rounded-[40px] mb-4 shadow-inner border border-slate-100">${q.p}</div>
                        <p class="text-xs text-slate-500 font-bold">對應哪一個注音符號？</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${opts.map(opt => `
                            <button onclick="handleAnswer('${opt}')" class="quiz-option-btn bg-white border-2 border-slate-100 rounded-[35px] font-black text-slate-700 hover:border-pink-400 hover:bg-pink-50 transition-all shadow-sm active:scale-95 flex items-center justify-center">
                                ${formatZhuyinVertical(opt)}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleAnswer(ans) {
            const duration = (performance.now() - state.startTime) / 1000;
            state.quizResults.push({ id: QUIZ_BANK[state.quizIndex].id, ok: ans === QUIZ_BANK[state.quizIndex].a, t: duration.toFixed(2) });
            if (state.quizIndex < 10) { state.quizIndex++; render(); }
            else { state.step = 2; render(); callBackendAI(); }
        }

        function renderStep2() {
            mainContent.innerHTML = `
                <div class="text-center py-28 flex flex-col items-center">
                    <div class="w-24 h-24 bg-pink-100 rounded-[35px] flex items-center justify-center mb-10 animate-bounce text-pink-400 shadow-inner shadow-pink-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 tracking-tight">智多星系統運算中</h3>
                    <p class="text-xs text-slate-400 mt-5 px-14 leading-relaxed font-medium">正透過安全通道連動 AI 擬定專屬計畫...</p>
                </div>
            `;
        }

        async function callBackendAI() {
            const promptData = { name: state.formData.name, results: state.quizResults };
            const sys = `你是一位「天使笑長」，專業於教育銜接。請根據數據擬定「幸福轉譯伴學方案」。請回傳 JSON: { "diagnosis": "一段話分析報告", "bottleneck": "核心轉譯瓶頸", "targetLessons": 20, "milestones": ["里程碑1", "里程碑2", "里程碑3"], "angelNote": "笑長悄悄話" }`;
            try {
                const resp = await fetch('/api/diagnose', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptData, systemInstruction: sys })
                });
                const data = await resp.json();
                state.report = JSON.parse(data.candidates[0].content.parts[0].text);
                state.step = 3; render();
            } catch (e) {
                console.error(e);
                mainContent.innerHTML = `<div class="p-10 text-center text-red-500 font-bold">解讀服務暫時異常，請檢查金鑰設定。</div>`;
            }
        }

        function renderStep3() {
            mainContent.innerHTML = `
                <div class="space-y-6 animate-zoom-in text-left">
                    <div class="bg-white p-8 rounded-[45px] border-l-[10px] border-pink-400 shadow-sm relative">
                        <h2 class="text-xl font-black text-slate-800 mb-8 tracking-tight">【${state.formData.name}】大腦解密報告</h2>
                        <div class="space-y-7">
                            <section>
                                <h4 class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-3.5">指標診斷與分析</h4>
                                <p class="bg-slate-50 p-6 rounded-[32px] text-sm text-slate-600 font-medium italic leading-relaxed report-text">${state.report.diagnosis}</p>
                            </section>
                            <section class="bg-amber-50 p-6 rounded-[32px] border border-amber-100">
                                <h4 class="font-bold text-amber-700 text-xs mb-2.5">核心轉譯瓶頸</h4>
                                <p class="text-sm text-slate-700 font-bold leading-relaxed">${state.report.bottleneck}</p>
                            </section>
                            <section>
                                <div class="flex justify-between items-end mb-4 px-1">
                                    <h4 class="font-bold text-slate-700 text-xs">建議伴學堂數</h4>
                                    <span class="text-pink-500 font-black text-2xl italic">${state.report.targetLessons} 堂</span>
                                </div>
                                <div class="space-y-3">
                                    ${state.report.milestones.map(m => `<div class="p-4 bg-white border border-slate-100 rounded-[28px] shadow-sm text-xs text-slate-600 font-bold">✓ ${m}</div>`).join('')}
                                </div>
                            </section>
                            <p class="text-sm font-bold text-pink-500 leading-relaxed italic">笑長悄悄話：${state.report.angelNote}</p>
                        </div>
                        <button onclick="state.step=4; render();" class="w-full mt-10 bg-slate-900 text-white py-5 rounded-[32px] font-bold shadow-2xl active:scale-95 transition-all text-sm uppercase tracking-widest">確認方案並查看報價</button>
                    </div>
                </div>
            `;
        }

        function renderStep4() {
            mainContent.innerHTML = `
                <div class="space-y-6 animate-fade-in text-left">
                    <div class="bg-white p-8 rounded-[45px] shadow-sm border border-pink-50">
                        <h2 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3 tracking-tight">幸福轉譯報價</h2>
                        <div class="space-y-6">
                            <div class="p-7 bg-slate-50 rounded-[35px] border border-slate-100 relative overflow-hidden">
                                <span class="bg-slate-200 text-slate-600 px-3.5 py-1 rounded-full text-[10px] font-black tracking-widest uppercase mb-4 inline-block">方案 A：基礎伴學</span>
                                <div class="flex items-baseline gap-2 mb-2"><span class="text-3xl font-black text-slate-700">$750</span><span class="text-xs text-slate-400 font-bold">/ 每堂 90 分鐘</span></div>
                                <p class="text-[10px] text-slate-500 font-bold italic leading-relaxed">* 客製電子教材費另計。</p>
                            </div>
                            <div class="p-8 bg-gradient-to-br from-pink-400 to-pink-500 text-white rounded-[45px] shadow-2xl relative overflow-hidden ring-4 ring-pink-100">
                                <span class="bg-white/20 text-white px-3.5 py-1 rounded-full text-[10px] font-black tracking-widest uppercase mb-4 inline-block">方案 B：全能伴學 (推薦)</span>
                                <div class="flex items-baseline gap-2 mb-3"><span class="text-4xl font-black text-white">$1000</span><span class="text-xs text-white/80 font-bold uppercase">/ 每堂 90 分鐘</span></div>
                                <p class="text-[11px] font-bold leading-relaxed">✓ 已含客製化電子教材費<br>✓ 針對指標精準優化轉譯反射</p>
                            </div>
                        </div>
                        <button onclick="window.open('https://line.me/R/msg/text/?'+encodeURIComponent('【診斷報告】\\n寶貝：'+state.formData.name+'\\n瓶頸：'+state.report.bottleneck), '_blank')" class="w-full mt-10 bg-[#06C755] text-white py-5 rounded-[32px] font-bold shadow-2xl active:scale-95 transition-all text-sm uppercase">按下回傳結果給笑長</button>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
