<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天使笑長 | 幸福教養系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9E3; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }
        
        /* --- 幸福智多星：專屬垂直注音排版系統 --- */
        .zhuyin-container { display: inline-flex; flex-direction: row; flex-wrap: wrap; align-items: flex-start; justify-content: center; gap: 1.8rem; padding: 0.5rem; max-width: 100%; }
        .syllable-v-stack { display: inline-flex; flex-direction: column; align-items: center; position: relative; line-height: 1.15; min-width: 1.6rem; }
        .symbol-item { font-size: 1.45rem; height: 1.5rem; font-weight: 800; color: #334155; display: flex; align-items: center; justify-content: center; position: relative; }
        .tone-side-right { position: absolute; right: -0.9rem; top: 0; font-size: 0.95rem; font-weight: 900; color: #64748b; }
        .is-long-text .symbol-item { font-size: 1.15rem; height: 1.25rem; }
        .is-long-text .tone-side-right { font-size: 0.75rem; right: -0.75rem; }

        input[type="checkbox"]:checked { background-color: #F472B6; border-color: #F472B6; }
        .no-break { white-space: nowrap; word-break: keep-all; }
        
        .primary-pink-btn { background-color: #F472B6; transition: all 0.2s; box-shadow: 0 12px 30px -5px rgba(244, 114, 182, 0.4); }
        .primary-pink-btn:active { transform: scale(0.96); opacity: 0.9; }
        .primary-pink-btn:disabled { background-color: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: not-allowed; opacity: 0.7; }
        
        .quiz-card-btn { min-height: 10rem; height: auto; padding: 1.5rem 0.5rem; border-width: 2.5px; }
    </style>
</head>
<body class="pb-12 text-slate-800">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-white px-6 pt-10 pb-6 rounded-b-[45px] shadow-sm border-b border-pink-100 sticky top-0 z-50 flex items-center justify-start gap-4">
            <div class="w-10 h-10 bg-pink-400 rounded-xl flex items-center justify-center text-white shadow-lg transition-transform active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </div>
            <div class="text-left">
                <h1 class="text-sm font-black text-gray-800 tracking-tight no-break">天使笑長</h1>
                <p class="text-[9px] text-pink-500 font-black tracking-[0.2em] uppercase no-break">幸福智多星 · 幸福教養系統</p>
            </div>
        </header>

        <main id="main-content" class="px-5 py-8 flex-1"></main>

        <footer class="text-center opacity-30 py-8">
            <p class="text-[9px] font-black tracking-[0.3em] uppercase text-slate-400">Happiness Mastermind · V5.10 Transparent</p>
        </footer>
    </div>

    <script>
        let state = { step: 0, formData: { name: '', hasFilledForm: false }, quizIndex: 0, quizResults: [], report: null, startTime: 0 };

        const QUIZ_BANK = [
            { id: 1, p: 'b', a: 'ㄅ', opts: ['ㄅ','ㄉ','ㄆ','ㄌ'] },
            { id: 2, p: 'p', a: 'ㄆ', opts: ['ㄑ','ㄆ','ㄡ','ㄅ'] },
            { id: 3, p: 'm', a: 'ㄇ', opts: ['ㄇ','ㄋ','ㄈ','ㄩ'] },
            { id: 4, p: 'bà', a: 'ㄅㄚˋ', opts: ['ㄅㄚˋ','ㄆㄚˋ','ㄅㄚˇ','ㄆㄚ'] },
            { id: 5, p: 'lóu', a: 'ㄌㄡˊ', opts: ['ㄌㄡˊ','ㄋㄡˊ','ㄌㄡˇ','ㄖㄡˊ'] },
            { id: 6, p: 'lian', a: 'ㄌㄧㄢ', opts: ['ㄌㄧㄢ','ㄌㄢ','ㄌㄧㄥ','ㄋㄧㄢ'] },
            { id: 7, p: 'huang', a: 'ㄏㄨㄤ', opts: ['ㄏㄨㄤ','ㄏㄤ','ㄏㄨㄥ','ㄏㄨㄢ'] },
            { id: 8, p: 'chi', a: 'ㄔ', opts: ['ㄔ','ㄔㄧ','ㄕ','ㄗ'] }, 
            { id: 9, p: 'si', a: 'ㄙ', opts: ['ㄙ','ㄙㄧ','ㄕ','ㄒㄧ'] },
            { id: 10, p: 'xué xiào', a: 'ㄒㄩㄝˊ ㄒㄧㄠˋ', opts: ['ㄒㄩㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˇ ㄒㄧㄠ','ㄒㄧㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˊ ㄒㄧㄠ'] },
            { id: 11, p: 'péng yǒu', a: 'ㄆㄥˊ ㄧㄡˇ', opts: ['ㄆㄥˊ ㄧㄡˇ','ㄅㄥˊ ㄧㄡˇ','ㄆㄥˊ ㄧㄡ','ㄆㄥˇ ㄧㄡ'] }
        ];

        function formatZhuyinVertical(str) {
            const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
            const syllables = str.split(' ');
            const isLong = str.length > 5;
            let html = `<span class="zhuyin-container ${isLong ? 'is-long-text' : ''}">`;
            syllables.forEach(syl => {
                let tone = "";
                let baseSyl = syl;
                for(let t of tones) if(syl.includes(t)) { tone = t; baseSyl = syl.replace(t, ""); break; }
                const chars = baseSyl.split('');
                html += `<span class="syllable-v-stack">`;
                chars.forEach((char, idx) => {
                    if (idx === chars.length - 1 && tone) html += `<span class="symbol-item">${char}<span class="tone-side-right">${tone}</span></span>`;
                    else html += `<span class="symbol-item">${char}</span>`;
                });
                if (chars.length === 0 && tone) html += `<span class="symbol-item">&nbsp;<span class="tone-side-right">${tone}</span></span>`;
                html += `</span>`;
            });
            html += `</span>`;
            return html;
        }

        function render() {
            const el = document.getElementById('main-content');
            if (state.step === 0) {
                el.innerHTML = `
                    <div class="bg-white p-9 rounded-[45px] shadow-sm border border-pink-50 animate-fade-in text-left">
                        <h2 class="text-base font-black text-slate-700 mb-6 no-break flex items-center gap-3">第一步：預約表單</h2>
                        <div class="space-y-7">
                            <button onclick="window.open('https://forms.gle/Ph8FfFPRtgMcVr5W8', '_blank')" class="w-full bg-blue-50 text-blue-600 py-4 rounded-[28px] font-black border border-blue-100 text-[10px]">前往 Google 預約表單</button>
                            <div class="flex items-center gap-4 p-1">
                                <input type="checkbox" id="form-check" class="w-5 h-5 rounded-lg text-pink-500" ${state.formData.hasFilledForm ? 'checked' : ''}>
                                <label for="form-check" class="text-[9px] text-slate-400 font-bold">我已完成填寫並返回網頁</label>
                            </div>
                            <div class="pt-2">
                                <label class="text-[11px] font-black text-slate-400 mb-2 block uppercase tracking-widest">寶貝姓名</label>
                                <input id="name-input" type="text" class="w-full p-5 bg-slate-50 rounded-[28px] border-none outline-none text-lg font-bold text-slate-700 shadow-inner" placeholder="例如：小明" value="${state.formData.name}">
                            </div>
                            <button id="start-btn" class="primary-pink-btn w-full text-white py-5 rounded-[30px] font-black text-lg transition-all disabled:opacity-50">幫寶貝前測</button>
                        </div>
                    </div>
                `;
                const n = document.getElementById('name-input'), c = document.getElementById('form-check'), b = document.getElementById('start-btn');
                const update = () => b.disabled = !(n.value.trim().length > 0 && c.checked);
                n.oninput = (e) => { state.formData.name = e.target.value; update(); };
                c.onchange = (e) => { state.formData.hasFilledForm = e.target.checked; update(); };
                b.onclick = () => { if(!b.disabled) { state.step = 1; render(); } };
                update();
            } else if (state.step === 1) {
                const q = QUIZ_BANK[state.quizIndex];
                const opts = [...q.opts].sort(() => Math.random() - 0.5);
                state.startTime = performance.now();
                el.innerHTML = `
                    <div class="bg-white p-8 rounded-[45px] shadow-sm animate-fade-in relative border border-pink-50 text-center">
                        <div class="absolute top-0 left-0 w-full h-2 bg-slate-50"><div class="h-full bg-pink-400 transition-all duration-500" style="width: ${((state.quizIndex + 1) / 11) * 100}%"></div></div>
                        <div class="flex justify-between items-center mb-10 mt-4"><span class="bg-pink-100 text-pink-600 px-4 py-1.5 rounded-full text-[10px] font-black">前測指標</span><span class="text-[10px] font-black text-slate-300">${state.quizIndex + 1} / 11</span></div>
                        <div class="text-5xl font-black text-slate-800 tracking-[0.25em] bg-slate-50 py-12 rounded-[45px] mb-10 shadow-inner font-serif">${q.p}</div>
                        <div class="grid grid-cols-2 gap-5">
                            ${opts.map(opt => `<button onclick="handleAnswer('${opt}')" class="quiz-card-btn bg-white border-2 border-slate-100 rounded-[35px] font-black text-slate-700 flex items-center justify-center shadow-sm active:scale-95 transition-all">${formatZhuyinVertical(opt)}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else if (state.step === 2) {
                el.innerHTML = `<div class="text-center py-28 flex flex-col items-center"><div class="w-24 h-24 bg-pink-100 rounded-[45px] flex items-center justify-center mb-12 animate-bounce text-pink-400 shadow-inner"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><h3 class="text-2xl font-black text-slate-800 tracking-tight">智多星分析中</h3></div>`;
            } else if (state.step === 3) {
                el.innerHTML = `<div class="space-y-8 animate-zoom-in text-left"><div class="bg-white p-9 rounded-[50px] border-l-[15px] border-pink-400 shadow-sm relative"><h2 class="text-2xl font-black text-slate-800 mb-8 tracking-tight">【${state.formData.name}】報告</h2><div class="space-y-8"><section class="bg-slate-50 p-7 rounded-[35px] text-base text-slate-600 font-medium italic leading-relaxed">${state.report.diagnosis}</section><p class="text-lg font-bold text-pink-500 leading-relaxed italic border-t border-dashed border-pink-200 pt-7">笑長悄悄話：${state.report.angelNote}</p></div><button onclick="state.step=4; render();" class="primary-pink-btn w-full mt-12 text-white py-6 rounded-[35px] font-black text-xl">方案報價</button></div></div>`;
            } else if (state.step === 4) {
                el.innerHTML = `<div class="space-y-8 animate-fade-in text-left"><div class="bg-white p-9 rounded-[50px] shadow-sm border border-pink-50"><h2 class="text-2xl font-black text-slate-800 mb-10 no-break">幸福教養方案報價</h2><div class="space-y-8"><div class="p-8 bg-slate-50 rounded-[40px] border border-slate-100"><div class="text-4xl font-black text-slate-700">$750 <span class="text-xs">/ 每堂 90 分鐘</span></div></div><div class="p-10 bg-gradient-to-br from-pink-400 to-pink-500 text-white rounded-[45px] shadow-2xl ring-8 ring-pink-100"><div class="text-5xl font-black text-white">$1000 <span class="text-xs">/ 每堂 90 分鐘</span></div></div></div><button onclick="window.open('https://line.me/R/msg/text/?'+encodeURIComponent('【診斷預約】\\n寶貝：'+state.formData.name+'\\n瓶頸：'+state.report.bottleneck), '_blank')" class="w-full mt-12 bg-[#06C755] text-white py-6 rounded-[35px] font-black text-xl no-break text-center">回傳笑長</button></div></div>`;
            }
        }

        async function handleAnswer(ans) {
            state.quizResults.push({ ok: ans === QUIZ_BANK[state.quizIndex].a });
            if (state.quizIndex < 10) { state.quizIndex++; render(); }
            else { state.step = 2; render(); await generateReport(); }
        }

        async function generateReport() {
            const promptData = { name: state.formData.name, data: state.quizResults };
            const sys = `你是一位專業教育銜接的「天使笑長」，請根據數據擬定 JSON: { "diagnosis": "診斷內容", "bottleneck": "瓶頸", "angelNote": "建議" }`;
            try {
                // 加入時間戳記避免快取
                const resp = await fetch(`/api/diagnose?t=${Date.now()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptData, systemInstruction: sys })
                });
                
                const data = await resp.json();
                
                // 如果後端小幫手回傳錯誤
                if (!resp.ok) {
                    throw new Error(data.error || `HTTP 狀態碼: ${resp.status}`);
                }

                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error('AI 思考後沒有產出內容，可能是被安全過濾器攔截。');
                }

                let text = data.candidates[0].content.parts[0].text;
                text = text.replace(/```json/g, '').replace(/```/g, '').replace(/^[^{]*/, '').replace(/[^}]*$/, '').trim();
                
                state.report = JSON.parse(text);
                state.step = 3; render();
            } catch (e) {
                console.error('Diagnosis Error:', e);
                document.getElementById('main-content').innerHTML = `
                    <div class="p-10 text-center animate-fade-in text-red-500 font-bold">
                        <p class="mb-2">⚠️ 科技連線中斷</p>
                        <div class="bg-red-50 p-4 rounded-2xl text-[10px] text-red-600 font-mono text-left mb-6 break-words">
                            診斷訊息：${e.message}
                        </div>
                        <button onclick="window.location.reload()" class="bg-slate-800 text-white px-8 py-3 rounded-full text-sm">點此重啟系統</button>
                    </div>`;
            }
        }
        render();
    </script>
</body>
</html>
