<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天使笑長 | 大腦密碼轉換前測</title>
    <style>
        :root {
            --primary: #FFB7C5; --secondary: #E0F7FA; --accent: #FF8A80;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #FFF9E3; display: flex; justify-content: center; padding: 20px; }
        #app { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .pinyin-box { font-size: 3.5rem; color: #00796B; margin: 20px 0; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 20px; font-size: 1.5rem; border: 2px solid var(--secondary); border-radius: 15px; background: white; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary); color: white; }
        .report { text-align: left; background: #F1F8E9; padding: 20px; border-radius: 15px; margin-top: 20px; display: none; }
        .indicator { margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="app">
    <h1 style="color: var(--accent);">✨ 大腦密碼轉換前測 ✨</h1>
    <div id="quiz-container">
        <p id="progress">準備開始...</p>
        <div class="pinyin-box" id="pinyin-display">---</div>
        <p id="instruction">點擊下方按鈕開始測驗</p>
        <div class="btn-grid" id="options">
            <button onclick="startQuiz()" style="grid-column: span 2;">點我開始測驗 (開啟聲音)</button>
        </div>
    </div>

    <div id="report-area" class="report">
        <h3>📊 大腦轉換分析報告</h3>
        <div id="analysis-content"></div>
        <button onclick="location.reload()" style="width:100%; margin-top:15px;">重新診斷</button>
    </div>
</div>

<script>
    const bank = [
        { p: 'b', a: 'ㄅ', opts: ['ㄅ','ㄉ','ㄆ','b'], type: '視覺排他', text: '請選出ㄅ' },
        { p: 'p', a: 'ㄆ', opts: ['ㄑ','ㄆ','q','ㄅ'], type: '視覺排他', text: '請選出ㄆ' },
        { p: 'bà', a: 'ㄅㄚˋ', opts: ['ㄅㄚˇ','ㄅㄚˋ','ㄅㄚ','ㄅㄚˊ'], type: '聲調座標', text: '爸爸' },
        { p: 'lóu', a: 'ㄌㄡˊ', opts: ['ㄌㄡˇ','ㄌㄡˊ','ㄌㄡ','ㄌㄡˋ'], type: '聲調座標', text: '樓梯' },
        { p: 'lian', a: 'ㄌㄧㄢ', opts: ['ㄌㄧㄢ','ㄌㄧㄢˊ','ㄌㄧㄢˇ','ㄌㄧㄢˋ'], type: '結合韻轉換', text: '練習的連' },
        { p: 'huang', a: 'ㄏㄨㄤ', opts: ['ㄏㄨㄤ','ㄏㄤ','ㄏㄨㄤˊ','ㄏㄨㄤˇ'], type: '結合韻轉換', text: '黃色的黃' },
        { p: 'chi', a: 'ㄔ', opts: ['ㄔ','ㄔㄧ','ㄔㄨ','ㄕ'], type: '特殊空韻', text: '吃飯的吃' },
        { p: 'si', a: 'ㄙ', opts: ['ㄙ','ㄙㄧ','ㄙㄨ','ㄕ'], type: '特殊空韻', text: '數字四' },
        { p: 'xué xiào', a: 'ㄒㄩㄝˊ ㄒㄧㄠˋ', opts: ['ㄒㄩㄝˊ ㄒㄧㄠˋ','ㄒㄩㄝˇ ㄒㄧㄠ','ㄒㄩㄝ ㄒㄧㄠˇ','ㄒㄩㄝˋ ㄒㄧㄠˊ'], type: '綜合自動化', text: '學校' }
    ];

    let current = 0;
    let results = [];
    let startTime;

    function speak(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'zh-TW';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function startQuiz() {
        current = 0;
        results = [];
        nextQuestion();
    }

    function nextQuestion() {
        if (current >= bank.length) return showReport();
        
        const q = bank[current];
        document.getElementById('progress').innerText = `指標測驗中：${current + 1} / ${bank.length}`;
        document.getElementById('pinyin-display').innerText = q.p;
        document.getElementById('instruction').innerText = "聽聽看，這是哪個注音？";
        
        const optsDiv = document.getElementById('options');
        optsDiv.innerHTML = '';
        q.opts.forEach(o => {
            const b = document.createElement('button');
            b.innerText = o;
            b.onclick = () => handleAnswer(o);
            optsDiv.appendChild(b);
        });

        speak(q.text);
        startTime = performance.now();
    }

    function handleAnswer(ans) {
        const duration = (performance.now() - startTime) / 1000;
        const q = bank[current];
        results.push({ ...q, userAns: ans, correct: ans === q.a, time: duration });
        current++;
        nextQuestion();
    }

    function showReport() {
        document.getElementById('quiz-container').style.display = 'none';
        const reportArea = document.getElementById('report-area');
        reportArea.style.display = 'block';

        const types = [...new Set(bank.map(b => b.type))];
        let html = "";

        types.forEach(t => {
            const items = results.filter(r => r.type === t);
            const score = items.filter(i => i.correct).length;
            const avgTime = items.reduce((a, b) => a + b.time, 0) / items.length;
            
            html += `<div class="indicator">
                <strong>【${t}】</strong> 答對率：${score}/${items.length}<br>
                平均反應時長：${avgTime.toFixed(2)} 秒<br>
                <small>${avgTime > 3 ? '⚠️ 反應較慢，大腦系統切換中' : '✅ 轉換流暢'}</small>
            </div>`;
        });

        document.getElementById('analysis-content').innerHTML = html + "<p><strong>笑長建議：</strong> 根據數據，重點應放在反應超過 3 秒的指標項目。</p>";
    }
</script>

</body>
</html>
